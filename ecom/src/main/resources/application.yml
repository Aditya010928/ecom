spring:
  application:
    name: ecom

  datasource:
    url: jdbc:postgresql://postgres-db:5432/postgres
    username: postgres
    password: postgres
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      idle-timeout: 30000
      connection-timeout: 30000
      max-lifetime: 1800000
      auto-commit: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        default_schema: ecom

  security:
    user:
      name: user
      password: 12345